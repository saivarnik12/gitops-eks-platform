name: CI — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Helm Charts
        uses: helm/chart-testing-action@v2
        with:
          command: lint

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: |
          cd terraform/envs/dev
          terraform init -backend=false
          terraform validate
          terraform fmt -check

      - name: Run Kubernetes manifest validation
        run: |
          curl -sLO https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          find argocd -name '*.yaml' | xargs ./kubeconform -strict -ignore-missing-schemas

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: meta
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/gitops-platform:$IMAGE_TAG .
          docker push $ECR_REGISTRY/gitops-platform:$IMAGE_TAG
          echo "tags=$ECR_REGISTRY/gitops-platform:$IMAGE_TAG" >> $GITHUB_OUTPUT

  update-helm-values:
    name: Update Helm Chart & Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in Helm values
        env:
          SHA: ${{ needs.build-and-push.outputs.short-sha }}
          ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
        run: |
          sed -i "s/tag: .*/tag: \"$SHA\"/" helm-charts/base-service/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-charts/base-service/values.yaml
          git commit -m "chore: bump image tag to $SHA [skip ci]"
          git push
