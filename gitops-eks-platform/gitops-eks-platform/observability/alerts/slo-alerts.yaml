groups:
  - name: slo.rules
    interval: 30s
    rules:

      # ── Error Budget Burn Rate (1h window) ──
      - alert: ErrorBudgetBurnRateCritical
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[1h]))
            /
            sum(rate(http_requests_total[1h]))
          ) > (1 - 0.999) * 14.4
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical error budget burn rate detected"
          description: "Service {{ $labels.service }} is burning error budget 14.4x faster than expected. Immediate action required."
          runbook: "https://github.com/Saivarnik12/gitops-eks-platform/blob/main/docs/runbook.md#error-budget-burn"

      - alert: ErrorBudgetBurnRateWarning
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[6h]))
            /
            sum(rate(http_requests_total[6h]))
          ) > (1 - 0.999) * 6
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated error budget burn rate"
          description: "Service {{ $labels.service }} is burning error budget 6x faster than expected."

  - name: kubernetes.rules
    rules:

      - alert: PodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."
          runbook: "https://github.com/Saivarnik12/gitops-eks-platform/blob/main/docs/runbook.md#pod-crashloop"

      - alert: NodeDiskPressure
        expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is under disk pressure"

      - alert: PersistentVolumeFillingUp
        expr: |
          kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PersistentVolume {{ $labels.persistentvolumeclaim }} is filling up"
          description: "PVC {{ $labels.persistentvolumeclaim }} has less than 15% free space."

      - alert: HPAMaxReplicasReached
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas
          ==
          kube_horizontalpodautoscaler_spec_max_replicas
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} has reached max replicas"
          description: "HPA is at maximum capacity. Scale limits may need adjustment."

  - name: kafka.rules
    rules:

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer lag critical on topic {{ $labels.topic }}"
          description: "Consumer group {{ $labels.consumergroup }} has a lag of {{ $value }} messages on topic {{ $labels.topic }}."
